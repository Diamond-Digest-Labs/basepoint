name: BasePoint Analytics Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install Targets Package
        run: |
          Rscript -e 'install.packages("targets")'

      - name: Validate Pipeline Structure
        run: |
          # We tell R to check the _targets.R file inside the subfolder
          Rscript -e 'setwd("analytics"); targets::tar_validate()'